apiVersion: v1
kind: ConfigMap
metadata:
  name: http-server-config
  labels:
    app: http-server
data:
  config.toml: |
    [server]
    domain = "your-domain.com"
    email = "your-email@example.com"
    host = "0.0.0.0"
    port = 443

    [tls]
    cert_dir = "/etc/http-server/certs/"
    use_staging = false
    hsts_max_age = 31536000
    hsts_include_subdomains = true

    # Proxy routes — uncomment and customize for your backends:
    # [[proxy]]
    # prefix = "/api"
    # upstream = "http://api-service:3000"
    #
    # [[proxy]]
    # prefix = "/app"
    # upstream = "http://web-service:8080"
